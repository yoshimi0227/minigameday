# @claude メンションでの対話 (質問・修正依頼・フォーク PR のレビュー起動)。
#
# issue / PR のコメントで「@claude ...」と書くと起動する。action 側が書き込み権限の
# あるユーザーのメンションにだけ応答する。フォーク PR の AI レビューはこちらから:
# メンテナが PR に「@claude この PR をレビューして」とコメントする
# (pull_request_target で head をチェックアウトする方式は取らない — 安全側に倒す)。
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --max-turns 30
